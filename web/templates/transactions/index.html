{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Transacciones</h1>
</div>

<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripción</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Importe</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoría</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
            </tr>
        </thead>
        <tbody id="transaction-tbody" class="divide-y divide-gray-200">
            {{range .Transactions}}
            <tr id="transaction-{{.ID}}">
                <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{.Date.Format "02/01/2006"}}</td>
                <td class="px-6 py-4 text-sm text-gray-900">{{.Description}}</td>
                <td class="px-6 py-4 text-sm text-gray-900 text-right whitespace-nowrap">{{printf "%.2f" .Amount}} €</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{.CategoryName}}</td>
                <td class="px-6 py-4">
                    {{if eq .Type "income"}}
                    <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">Ingreso</span>
                    {{else}}
                    <span class="px-2 py-1 text-xs font-medium bg-red-100 text-red-800 rounded-full">Gasto</span>
                    {{end}}
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
