<!DOCTYPE html>
<html lang="es">

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4">

            <span class="text-xl font-bold text-indigo-600">BucketWise</span>
            <div class="flex gap-6">
                <a href="/categories" class="text-gray-600 hover:text-indigo-600 text-sm font-medium">Categorías</a>
                <a href="/transactions" class="text-gray-600 hover:text-indigo-600 text-sm font-medium">Transacciones</a>

        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-8">
        {{template "content" .}}
    </main>

</body>
</html>
