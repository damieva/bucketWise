<tr id="category-{{.ID}}">
    <td class="px-6 py-4 text-sm text-gray-900">{{.Name}}</td>
    <td class="px-6 py-4">
        {{if eq .Type "income"}}
        <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">Ingreso</span>
        {{else}}
        <span class="px-2 py-1 text-xs font-medium bg-red-100 text-red-800 rounded-full">Gasto</span>
        {{end}}
    </td>
    <td class="px-6 py-4 text-right">
        <button hx-delete="/categories/{{.ID}}"
                hx-target="#category-{{.ID}}"
                hx-swap="outerHTML"
                hx-confirm="¿Eliminar esta categoría?"
                class="text-red-600 hover:text-red-800 text-sm font-medium">
            Eliminar
        </button>
    </td>
</tr>
