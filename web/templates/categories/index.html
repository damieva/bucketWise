{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Categorías</h1>
</div>

<div class="bg-white rounded-lg shadow p-6 mb-6">
    <form hx-post="/categories"
          hx-target="#category-tbody"
          hx-swap="beforeend"
          hx-on::after-request="this.reset()"
          class="flex gap-4 items-end">
        <div class="flex-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input name="name" type="text" required
                   placeholder="ej. Alquiler"
                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="w-40">
            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
            <select name="type"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="expense">Gasto</option>
                <option value="income">Ingreso</option>
            </select>
        </div>
        <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-md">
            Agregar
        </button>
    </form>
</div>

<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                <th class="px-6 py-3"></th>
            </tr>
        </thead>
        <tbody id="category-tbody" class="divide-y divide-gray-200">
            {{range .Categories}}
            <tr id="category-{{.ID}}">
                <td class="px-6 py-4 text-sm text-gray-900">{{.Name}}</td>
                <td class="px-6 py-4">
                    {{if eq .Type "income"}}
                    <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">Ingreso</span>
                    {{else}}
                    <span class="px-2 py-1 text-xs font-medium bg-red-100 text-red-800 rounded-full">Gasto</span>
                    {{end}}
                </td>
                <td class="px-6 py-4 text-right">
                    <button hx-delete="/categories/{{.ID}}"
                            hx-target="#category-{{.ID}}"
                            hx-swap="outerHTML"
                            hx-confirm="¿Eliminar esta categoría?"
                            class="text-red-600 hover:text-red-800 text-sm font-medium">
                        Eliminar
                    </button>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
