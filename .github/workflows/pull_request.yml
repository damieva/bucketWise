name: PR Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'cmd/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            helm:
              - 'deploy/**'

  ci:
    name: CI + Security
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: bucketwise:pr

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: bucketwise:pr
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true


  helm-ci:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm lint
        run: helm lint deploy/bucketwise-backend

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [ci, helm-ci]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.ci.result }}" == "failure" || "${{ needs.helm-ci.result }}" == "failure" ]]; then
            exit 1
          fi
